services:
  agrosense:
    image: ${AGROSENSE_IMAGE:-ghcr.io/goutham-k-278/agrosense:latest}
    pull_policy: always
    init: true
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - path: ./.env
        required: true
    environment:
      NODE_ENV: production
      DISEASE_INFERENCE_ENGINE: ${DISEASE_INFERENCE_ENGINE:-onnx}
      PYTHON_PATH: python3
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:' + (process.env.PORT || 5000) + '/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
